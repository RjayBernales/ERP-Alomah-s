<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:#f5f7f5; padding:16px; }
  .chart-card { background:white; border-radius:10px; box-shadow:0 2px 12px rgba(0,0,0,0.08); overflow:hidden; }
  .chart-header {
    background:#1a5c2a; color:white; padding:12px 18px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .chart-header h2 { font-size:13px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
  .chart-badge { font-size:11px; background:rgba(255,255,255,0.2); padding:3px 10px; border-radius:20px; }
  .chart-body { padding:20px; }
  canvas { max-height:280px; }
</style>
</head><body>
<div class="chart-card">
  <div class="chart-header">
    <h2>📈 Income & Expenses Over Time</h2>
    <span class="chart-badge">Alomah's ERP</span>
  </div>
  <div class="chart-body">
    <canvas id="c"></canvas>
  </div>
</div>
<script>
Chart.defaults.font.family = "'DM Sans', sans-serif";
Chart.defaults.font.size = 12;
Chart.defaults.color = '#4a7a50';

new Chart(document.getElementById('c'),{
  type:'line',
  data:{
    labels:['May 1','May 2','May 3','May 4','May 5','May 6','May 7','May 8'],
    datasets:[{
      label:'Amount (₱)',
      data:[15000,4500,8000,2200,9600,1800,3200,2900],
      borderColor:'#2e7d32',
      backgroundColor:'rgba(46,125,50,0.08)',
      fill:true, tension:0.4,
      pointBackgroundColor:'#2e7d32', pointRadius:5
    }]
  },
  options:{
    responsive:true,
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{label:ctx=>'₱'+ctx.raw.toLocaleString()}}
    },
    scales:{
      y:{grid:{color:'#edf3ee'},ticks:{callback:v=>'₱'+(v/1000)+'k'}},
      x:{grid:{display:false}}
    }
  }
});
</script>
</body></html>

<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:#f5f7f5; padding:16px; }
  .chart-card { background:white; border-radius:10px; box-shadow:0 2px 12px rgba(0,0,0,0.08); overflow:hidden; }
  .chart-header {
    background:#1a5c2a; color:white; padding:12px 18px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .chart-header h2 { font-size:13px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
  .chart-badge { font-size:11px; background:rgba(255,255,255,0.2); padding:3px 10px; border-radius:20px; }
  .chart-body { padding:20px; }
  canvas { max-height:280px; }
</style>
</head><body>
<div class="chart-card">
  <div class="chart-header">
    <h2>👥 Salary Distribution by Staff</h2>
    <span class="chart-badge">Alomah's ERP</span>
  </div>
  <div class="chart-body">
    <canvas id="c"></canvas>
  </div>
</div>
<script>
Chart.defaults.font.family = "'DM Sans', sans-serif";
Chart.defaults.font.size = 12;
Chart.defaults.color = '#4a7a50';

new Chart(document.getElementById('c'),{
  type:'doughnut',
  data:{
    labels:['Maria Santos','Ana Gomez','Pedro Cruz','Carlo Mendoza'],
    datasets:[{
      data:[18000,13000,11000,11500],
      backgroundColor:['#2e7d32','#388e3c','#66bb6a','#a5d6a7'],
      borderWidth:2, borderColor:'#fff', hoverOffset:8
    }]
  },
  options:{
    responsive:true, cutout:'62%',
    plugins:{
      legend:{position:'right',labels:{padding:16,boxWidth:14}},
      tooltip:{callbacks:{label:ctx=>ctx.label+': ₱'+ctx.raw.toLocaleString()}}
    }
  }
});
</script>
</body></html>
